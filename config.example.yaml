# issue-keeper 配置文件
# 把 AgentProc profile 绑定到仓库；程序监控这些仓库的 issue（可选 PR），
# 发现有新 issue/PR 或新评论时，先过一道安全过滤（screener），
# 再通过 agentproc CLI 调用对应 profile 的 agent 处理，并把 agent 的回复作为评论发回。

# daemon 模式的轮询间隔（秒）。--once 模式忽略此值。
poll_interval_secs: 300

# 状态文件路径：记录每个仓库已处理的 issue/PR / 评论 / agent 会话。
state_file: ~/.issue-keeper/state.json

# agent 发出的评论里携带的隐藏标记。三层防循环之第一层（机器识别）。
bot_marker: "<!-- issue-keeper-bot -->"

# 调用 agent 时的整体超时（秒）。
default_timeout_secs: 600

# 调用 agent 时写入 AGENT_FROM_USER 的值；也作为 agent_label 的 fallback。
agent_from_user: "issue-keeper"

# 默认 review agent：人提的 issue 处理完后，由这个 agent 先 review。
# 为空则人提的 issue 处理完停在 review 状态等人接手。
# 每个 repo 也可单独配 review_agent 覆盖此全局默认。
default_review_agent: "reviewer-agent"

# 单一人类模型：keeper 代谁 review / HitL 永远推给这一个人（ilink 通道只推给一个激活用户）。
human_label: "human"

# ─── keeper 巡检（代人类 review / 主动分诊）──────────────────────────────
# keeper（role=keeper 的绑定，如 issue-keeper-agent）定期巡检「等人处理」的 issue：
#   - 人提的 issue 停在 review（agent 已回复等人接手）→ keeper 代为 review。
#   - 人提的 issue 停在 inbox 超过 stale_inbox_secs → keeper 代为分诊。0 = 只看 review。
# 每 interval_cycles 轮跑一次（防每轮打扰人类）；每条 issue 无新活动不重复巡检/HitL。
# 需要 keeper 绑定 role=keeper + 接好 hitl MCP（见 README「keeper 的 HitL 接入」）。
keeper_patrol:
  enabled: true
  interval_cycles: 4        # 4 × poll_interval ≈ 20min
  stale_inbox_secs: 7200    # inbox 停留超过 2h 纳入巡检；0 = 只看 review
  max_per_cycle: 5          # 每轮最多巡检多少条候选 issue

# keeper agent 的调用超时（秒）。keeper 可能用 HitL 等人类回复（hitl --timeout 3600 = 1h），
# 所以默认 65min，比普通 agent 的 default_timeout_secs 大。仅对 role=keeper 的绑定生效。
keeper_timeout_secs: 3900

# ─── 安全过滤层（screener）────────────────────────────────────────────
# 在把内容投给主 agent 之前，先用一次纯 HTTP 的 LLM 调用检查是否含指令注入。
# 这一层在 keeper 进程内完成，不起子进程、无本地权限。
#
# provider: openai     —— OpenAI 兼容（DeepSeek / OpenAI / Moonshot 等）。默认。
# provider: anthropic  —— Anthropic messages API。
#
# fail-safe：必须显式声明 screener.enabled。不写 screener 段 = 启动报错。
screener:
  enabled: true
  provider: openai
  api_key: ${DEEPSEEK_API_KEY}
  base_url: "https://api.deepseek.com/v1"
  model: deepseek-chat
  on_unsafe: skip        # skip（默认）/ comment
  max_chars: 8000

# ─── 项目绑定在哪里？──────────────────────────────────────────────────
# 项目绑定（repo/agent_label/cwd/profile/source/monitor_prs/env/github_token/intro）
# 不写在本文件，而是存在 internal.db 的 projects 表——这是 issue-keeper 的单一配置源。
# keeper 每轮 live-reload：db 里增删项目、改介绍/绑定即时生效，无需重启。
#
# 增删项目用 CLI：
#   python -m issue_keeper team add owner/repo --agent-label proj-a-agent \
#     --cwd ~/projects/proj-a --profile claude-code --source github_token \
#     --github-token '${GITHUB_TOKEN}' --env ANTHROPIC_API_KEY=${DEEPSEEK_API_KEY}
#   python -m issue_keeper team remove owner/repo
#   python -m issue_keeper team list
# 或一键 onboard（含自动生成自我介绍）：
#   python -m issue_keeper onboard ~/projects/newproj --agent-label newproj-agent --gen-intro
#
# 从旧版（repos 写在 yaml）升级时，一次性迁移：
#   python -m issue_keeper team import --config <旧 config.yaml>
# （旧 team.json 的 intro 也会一并迁进 db，team.json 改名为 .migrated 备份）

# 项目绑定 + issue 共用的 SQLite（projects 表与 issues 同库）
internal_db: ~/.issue-keeper/internal.db

# ─── 全局 agent env 模板 ──────────────────────────────────────────────
# 所有 agent 共用的 LLM 连接。密钥用 ${VAR} 引用，实际值在环境变量里
# （不入库、不进文件明文）。load_config 把这份模板套到 db 里每个项目绑定上；
# 某项目需要单独 env 时，在该项目 env 列覆盖（team add --env KEY=VALUE）。
agent_env:
  ANTHROPIC_API_KEY: ${DEEPSEEK_API_KEY}
  ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic"
  CLAUDE_MODEL: "deepseek-chat"
  # DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}   # 用 deepseek CLI profile 时
  # DEEPSEEK_MODEL: deepseek-v4-pro

# ─── 防循环机制（三层保险）───────────────────────────────────────────
# 1. 评论/资源正文含 bot_marker（隐藏 HTML 注释）
# 2. 评论/资源正文含可见前缀 [issue-keeper:<agent_label>]
# 3. 评论/资源的 author == 当前 source 身份（self_identity）
# 任一命中即跳过。资源层（issue 本体）也识别 marker：
# AI 自己提的 issue 不触发首次回复，但评论层照常——别人/别的 agent 来评论仍触发。

# ─── 状态机（仅 internal source）─────────────────────────────────────
# issue 有 6 个状态：inbox / todo / doing / review / done / closed
# 流转规则（keeper 自动）：
#   人提的 issue 新建 → inbox
#   agent 提的 issue 新建 → todo
#   keeper 开始调 agent → doing
#   agent 回复完 → review
#   review 通过 → done
#   close → closed
#
# review 规则：
#   - agent 提的 issue → 该 agent 自己 review（下轮自动通过）
#   - 人提的 issue → 由 default_review_agent（或 repo 的 review_agent）先 review
#     需要人二次 review 时人接手
#
# CLI 改状态：python -m issue_keeper internal move <project> <number> --status <状态>
# CLI 看板：  python -m issue_keeper internal board <project>

